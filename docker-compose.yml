# =============================================================
# Docker Compose Commands Reference
# =============================================================
#
# Start all services in detached mode:
#   docker-compose up -d
#
# Start and rebuild if Dockerfile changed:
#   docker-compose up -d --build
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes (CAUTION: deletes data):
#   docker-compose down -v
#
# View logs for all services:
#   docker-compose logs -f
#
# View logs for specific service:
#   docker-compose logs -f lead-pipeline
#
# Restart specific service:
#   docker-compose restart lead-pipeline
#
# Execute command in running container:
#   docker-compose exec lead-pipeline python -c "print('Hello')"
#
# Access container shell:
#   docker-compose exec lead-pipeline /bin/bash
#
# View service status:
#   docker-compose ps
#
# Scale service (multiple instances):
#   docker-compose up -d --scale lead-pipeline=3
#
# Validate compose file:
#   docker-compose config
#
# Pull latest images:
#   docker-compose pull
#
# Build without starting:
#   docker-compose build
#
# View resource usage:
#   docker-compose top
#
# =============================================================
# Production Deployment Checklist
# =============================================================
#
# 1. [ ] Create .env file with all required variables
# 2. [ ] Set appropriate LOG_LEVEL (INFO or WARNING)
# 3. [ ] Configure resource limits based on workload
# 4. [ ] Set up volume backups for ./data directory
# 5. [ ] Configure log rotation and aggregation
# 6. [ ] Implement monitoring and alerting
# 7. [ ] Test health check endpoint
# 8. [ ] Set up SSL/TLS if exposing services
# 9. [ ] Configure firewall rules for exposed ports
# 10. [ ] Document disaster recovery procedures
# 11. [ ] Set up automated updates for base images
# 12. [ ] Configure secrets management (Docker Secrets)
# 13. [ ] Test rollback procedures
# 14. [ ] Set up CI/CD pipeline integration
# 15. [ ] Performance testing under expected load
#
# =============================================================
# Troubleshooting
# =============================================================
#
# Container won't start:
#   docker-compose logs lead-pipeline
#   docker-compose ps
#
# Permission issues with volumes:
#   sudo chown -R 1000:1000 ./data ./logs
#
# Port already in use:
#   Change port mapping in ports section (e.g., 9011:8080)
#
# Out of memory:
#   Increase memory limit in deploy.resources.limits
#
# Database locked:
#   Ensure only one instance is accessing SQLite database
#
# Network issues:
#   docker-compose down
#   docker network prune
#   docker-compose up -d
