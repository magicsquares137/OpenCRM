# Arkitekt OpenCRM - Docker Compose Configuration
# =============================================================
# Production-ready Docker Compose configuration for orchestrating
# the Arkitekt OpenCRM lead automation pipeline
#
# Features:
# - Automated service management
# - Volume persistence for database and logs
# - Environment variable management
# - Health check monitoring
# - Auto-restart policy
# - Resource limits
# - Network isolation
#
# Usage:
#   Start:   docker-compose up -d
#   Stop:    docker-compose down
#   Logs:    docker-compose logs -f lead-pipeline
#   Restart: docker-compose restart lead-pipeline
#   Rebuild: docker-compose up -d --build

services:
  # =============================================================
  # Lead Pipeline Service
  # =============================================================
  # Main application service that fetches Meta leads and sends
  # them via Outlook email using Microsoft Graph API
  
  lead-pipeline:
    # Service metadata
    container_name: opencrm-pipeline
    hostname: opencrm-pipeline
    
    # Build configuration
    build:
      context: .
      dockerfile: Dockerfile
      # Multi-stage build targets runtime stage
      target: runtime
      args:
        # Build arguments (if needed for customization)
        PYTHON_VERSION: "3.12"
      # Build labels for image metadata
      labels:
        com.opencrm.service: "lead-pipeline"
        com.opencrm.version: "1.0.0"
        com.opencrm.description: "Arkitekt OpenCRM lead automation pipeline"
    
    # Use pre-built image (alternative to building)
    # Uncomment to use existing image instead of building
    # image: meta-leads-outlook-automation:latest
    
    # Environment variables from .env file
    # This file should contain all sensitive configuration
    # See .env.example for required variables
    env_file:
      - .env
    
    # Additional environment variables
    # These override values from .env file if specified
    # Note: Most settings come from .env file via env_file directive above.
    # Only add overrides here for container-specific paths.
    environment:
      # Timezone
      - TZ=UTC

      # Database configuration (container path)
      - DB_PATH=/app/data/database/leads.db

      # Logging configuration (container path)
      - LOG_DIR=/app/logs
      - LOG_FILE_PATH=/app/logs/application/leads_automation.log

      # Health check configuration
      - HEALTH_CHECK_PORT=8080
      - HEALTH_CHECK_ENABLED=true
    
    # Port mapping for health check endpoint
    # Format: HOST_PORT:CONTAINER_PORT
    ports:
      - "9010:8080"
    
    # Volume mounts for persistent data
    # Ensures data survives container restarts
    volumes:
      # SQLite database persistence
      - ./data:/app/data:rw
      
      # Application logs persistence
      - ./logs:/app/logs:rw
      
      # Optional: Mount custom configuration
      # - ./config:/app/config:ro
      
      # Optional: Mount custom timezone data
      # - /etc/localtime:/etc/localtime:ro
    
    # Restart policy
    # always: Always restart the container if it stops
    # unless-stopped: Restart unless explicitly stopped
    # on-failure: Only restart if container exits with error
    restart: unless-stopped
    
    # Resource limits and reservations
    # Prevents container from consuming all host resources
    deploy:
      resources:
        limits:
          cpus: '1.0'        # Maximum 1 CPU core
          memory: 512M       # Maximum 512MB RAM
        reservations:
          cpus: '0.25'       # Minimum 0.25 CPU core
          memory: 128M       # Minimum 128MB RAM
    
    # Health check configuration
    # Monitors application health and auto-restarts if unhealthy
    healthcheck:
      # Health check command
      # Attempts to verify application is running correctly
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      
      # Health check timing
      interval: 30s          # Check every 30 seconds
      timeout: 10s           # Wait max 10 seconds for response
      start_period: 40s      # Grace period on startup
      retries: 3             # Mark unhealthy after 3 failures
    
    # Logging configuration for container
    logging:
      driver: json-file
      options:
        max-size: "10m"      # Maximum log file size
        max-file: "3"        # Keep 3 log files
        compress: "true"     # Compress rotated logs
    
    # Network configuration
    networks:
      - lead-pipeline-network
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # User mapping (already set in Dockerfile)
    # user: "1000:1000"
    
    # Read-only root filesystem (optional, for extra security)
    # Requires writable volumes for data and logs
    # read_only: true
    
    # Stop grace period (time to gracefully shutdown)
    stop_grace_period: 30s
    
    # Stop signal
    stop_signal: SIGTERM
    
    # Dependencies (if other services are added)
    # depends_on:
    #   - database
    #   - monitoring

  # =============================================================
  # Dashboard Service
  # =============================================================
  # Read-only web dashboard for viewing leads and email status

  dashboard:
    container_name: opencrm-dashboard
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/database/leads.db
      - DASHBOARD_PORT=5050
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - SENDER_NAME=${SENDER_NAME:-}
    ports:
      - "5050:5050"
    volumes:
      - ./data:/app/data:rw
    restart: unless-stopped
    command: ["python", "dashboard.py"]
    networks:
      - lead-pipeline-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

# =============================================================
# Networks
# =============================================================
# Define custom network for service isolation
networks:
  lead-pipeline-network:
    driver: bridge
    name: opencrm-network
    # Network labels
    labels:
      com.opencrm.network: "main"

